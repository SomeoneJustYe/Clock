<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clock</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
 
  <div class="bg-grid"></div>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>
 
  <main class="container">
 
    <header class="header">
      <div class="logo-dot"></div>
      <span class="logo-text">CHRONO</span>
    </header>
 
    <section class="clock-display">
      <div class="date-line" id="date-line">SUNDAY · 19 APRIL 2026</div>
      <div class="time-wrap">
        <span class="time" id="time">00:00:00</span>
        <span class="ampm" id="ampm">AM</span>
      </div>
      <div class="timezone" id="timezone">UTC+8 · Kuala Lumpur</div>
    </section>
 
    <nav class="nav-buttons">
      <a class="nav-btn" href="alarm.html">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            <line x1="2" y1="4" x2="5" y2="7"/>
            <line x1="22" y1="4" x2="19" y2="7"/>
          </svg>
        </div>
        <span class="btn-label">Alarm</span>
        <div class="btn-arrow">→</div>
      </a>
 
      <a class="nav-btn" href="stopwatch.html">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="13" r="8"/>
            <polyline points="12 9 12 13 15 16"/>
            <line x1="9" y1="2" x2="15" y2="2"/>
            <line x1="19.07" y1="5.93" x2="17.66" y2="7.34"/>
          </svg>
        </div>
        <span class="btn-label">Stopwatch</span>
        <div class="btn-arrow">→</div>
      </a>
 
      <a class="nav-btn" href="timer.html">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <span class="btn-label">Timer</span>
        <div class="btn-arrow">→</div>
      </a>
    </nav>
 
  </main>
 
  <script src="script.js"></script>
</body>
</html>
